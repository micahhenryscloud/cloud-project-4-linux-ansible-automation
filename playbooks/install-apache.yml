---
- name: Configure Apache web server
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Ensure Apache is running and enabled
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create custom homepage
      copy:
        content: "<h1>Hello from Ansible</h1><p>Apache was configured automatically.</p>"
        dest: /var/www/html/index.html